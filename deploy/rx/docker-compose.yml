# EveryDayMeds Rx stack — API + PostgreSQL + prescriber portal
# Usage (from repo root):
#   docker compose -f deploy/rx/docker-compose.yml up -d --build
#   docker compose -f deploy/rx/docker-compose.yml run --rm db-init
#
# Rx portal: http://localhost:5174
# API health: http://localhost:5000/api/healthz

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pharmacare}
    volumes:
      - rx_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pharmacare}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deploy/rx/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-pharmacare}
      PORT: "5000"
      NODE_ENV: production
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy

  rx:
    build:
      context: ../..
      dockerfile: deploy/rx/Dockerfile.rx
    restart: unless-stopped
    ports:
      - "${RX_PORT:-5174}:80"
    depends_on:
      - api

  db-init:
    profiles: ["init"]
    build:
      context: ../..
      dockerfile: deploy/rx/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-pharmacare}
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        pnpm --filter @workspace/db run push-force
        cd scripts && pnpm exec tsx ./src/seed-conditions.ts && pnpm exec tsx ./src/seed-demo-consultations.ts
    restart: "no"

volumes:
  rx_pgdata:
